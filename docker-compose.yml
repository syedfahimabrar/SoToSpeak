# So-to-Speak 2.0 — full stack.
#   docker compose up -d --build      # build + run in the background
#   docker compose logs -f            # follow logs
#   docker compose down               # stop (volumes/model cache are kept)
#
# Open http://localhost:8080  (frontend serves the UI and proxies /api to the backend).
#
# Defaults run on CPU. For the NVIDIA GPU server: set SOTOSPEAK_DEVICE=cuda (e.g.
# in a .env file next to this one) and uncomment the `gpus: all` line below.

services:
  backend:
    build: ./backend
    environment:
      # cuda | mps | cpu  (mps is not available inside Linux containers)
      SOTOSPEAK_DEVICE: ${SOTOSPEAK_DEVICE:-cpu}
      SOTOSPEAK_MODEL: ${SOTOSPEAK_MODEL:-k2-fsa/OmniVoice}
      # Pin the exact model weights so every host pulls the same version.
      SOTOSPEAK_MODEL_REVISION: ${SOTOSPEAK_MODEL_REVISION:-c5fdb5ccb189668d56333f77ba2629f4cd7535f4}
    volumes:
      - model-cache:/cache   # OmniVoice + UTMOS weights persist across restarts
      - audio-data:/data     # generated audio + uploaded references
    ports:
      - "8000:8000"          # optional: direct API access (frontend also proxies it)
    restart: unless-stopped

    # --- NVIDIA GPU (needs nvidia-container-toolkit) — also set SOTOSPEAK_DEVICE=cuda ---
    # gpus: all
    # If your Compose is too old for `gpus:`, use this instead:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model-cache:
  audio-data:
